<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광교삼성H정형외과 체형 분석 LAB · 리포트 해설</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg:#F2F6F3;
    --bg-alt:#E7EFE9;
    --panel:#FFFFFF;
    --ink:#152420;
    --ink-soft:#54655D;
    --ink-faint:#8B978F;
    --primary:#0F3D3B;
    --primary-soft:#DCEAE6;
    --coral:#E85A3B;
    --coral-soft:#FBE4DD;
    --amber:#C98A22;
    --amber-soft:#F7EAD2;
    --green:#2F8F62;
    --green-soft:#DCEFE3;
    --line:#D8E2DC;
    --radius:14px;
    --shadow: 0 1px 2px rgba(21,36,32,0.04), 0 8px 24px -12px rgba(21,36,32,0.18);
    --sans:'Noto Sans KR', -apple-system, sans-serif;
    --display:'Space Grotesk', var(--sans);
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--primary); color:#fff;}

  a{color:inherit;}

  .app{
    max-width:1180px;
    margin:0 auto;
    padding:28px 24px 120px;
  }

  /* ---------- Header ---------- */
  .app-header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    padding-bottom:22px;
    border-bottom:1px solid var(--line);
    margin-bottom:28px;
    flex-wrap:wrap;
  }
  .wordmark{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .wordmark .clinic-eyebrow{
    font-family:var(--sans);
    font-size:12px;
    font-weight:700;
    letter-spacing:0.04em;
    color:var(--ink-faint);
  }
  .wordmark .kr{
    font-family:var(--sans);
    font-weight:900;
    font-size:26px;
    letter-spacing:-0.02em;
    color:var(--primary);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .wordmark .kr svg{flex:none;}
  .wordmark .en{
    font-family:var(--display);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-left:38px;
  }
  .header-meta{
    font-size:13px;
    color:var(--ink-soft);
    text-align:right;
  }
  .header-meta strong{color:var(--ink);}

  /* ---------- Layout ---------- */
  .layout{
    display:grid;
    grid-template-columns:240px 1fr;
    gap:24px;
    align-items:start;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    position:sticky;
    top:20px;
  }
  @media (max-width:820px){ .sidebar{position:static;} }
  .sidebar h2{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--ink-faint);
    margin:4px 0 12px;
    font-weight:700;
  }
  .btn-new{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--primary);
    background:var(--primary);
    color:#fff;
    font-family:var(--sans);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    margin-bottom:16px;
    transition:opacity .15s;
  }
  .btn-new:hover{opacity:.88;}
  .btn-search{
    width:100%;
    padding:9px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink-soft);
    font-family:var(--sans);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    margin-bottom:16px;
    transition:border-color .15s, color .15s;
  }
  .btn-search:hover{border-color:var(--primary); color:var(--primary);}
  .btn-search.active{border-color:var(--primary); color:var(--primary); background:var(--primary-soft);}
  .history-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;}
  .history-item{
    padding:9px 10px;
    border-radius:9px;
    cursor:pointer;
    font-size:13px;
    color:var(--ink-soft);
    border:1px solid transparent;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
  }
  .history-item .h-main{display:flex; flex-direction:column; gap:1px; flex:1; min-width:0; cursor:pointer;}
  .history-item:hover{background:var(--bg-alt);}
  .history-item.active{background:var(--primary-soft); border-color:var(--primary); color:var(--primary);}
  .history-item .h-name{font-weight:700; color:var(--ink);}
  .history-item.active .h-name{color:var(--primary);}
  .history-item .h-date{font-family:var(--mono); font-size:11px; color:var(--ink-faint);}
  .history-item .h-delete{
    flex:none;
    color:var(--ink-faint);
    font-size:13px;
    padding:4px 6px;
    border-radius:6px;
    cursor:pointer;
    opacity:0;
    transition:opacity .12s, color .12s, background .12s;
  }
  .history-item:hover .h-delete{opacity:1;}
  .history-item .h-delete:hover{color:var(--coral); background:var(--coral-soft);}
  .history-empty{font-size:12.5px; color:var(--ink-faint); padding:6px 2px;}

  /* ---------- Main ---------- */
  .main{min-height:420px;}

  /* Upload zone */
  .upload-zone{
    background:var(--panel);
    border:1.5px dashed var(--line);
    border-radius:var(--radius);
    padding:56px 32px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .upload-zone.drag{border-color:var(--primary); background:var(--primary-soft);}
  .upload-zone svg{margin-bottom:14px;}
  .upload-zone h3{
    font-size:18px;
    margin:0 0 6px;
    font-weight:700;
  }
  .upload-zone p{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0;
  }
  .upload-zone input{display:none;}

  .file-strip{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
  }
  .file-chip{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px 8px 8px;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .file-chip img{width:34px; height:34px; object-fit:cover; border-radius:6px; border:1px solid var(--line);}
  .file-chip .remove{cursor:pointer; color:var(--ink-faint); font-weight:700; padding:2px 4px;}
  .file-chip .remove:hover{color:var(--coral);}

  .analyze-row{
    display:flex;
    justify-content:flex-end;
    margin-top:18px;
    gap:10px;
  }
  .btn-primary{
    padding:12px 22px;
    border-radius:10px;
    border:none;
    background:var(--primary);
    color:#fff;
    font-family:var(--sans);
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .btn-primary:disabled{opacity:.45; cursor:not-allowed;}
  .btn-primary:not(:disabled):hover{opacity:.9;}
  .btn-ghost{
    padding:12px 18px;
    border-radius:10px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    font-family:var(--sans);
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--ink-faint); color:var(--ink);}

  /* ---------- Gait loader ---------- */
  .loader-wrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:52px 24px;
    text-align:center;
  }
  .gait-track{
    position:relative;
    width:220px;
    height:64px;
    margin:0 auto 22px;
  }
  .footprint{
    position:absolute;
    width:22px;
    height:34px;
    opacity:0;
    animation:step 1.4s infinite;
  }
  .footprint.l{left:0; top:0; animation-delay:0s;}
  .footprint.r{left:34px; top:22px; animation-delay:.35s;}
  .footprint.l2{left:68px; top:0; animation-delay:.7s;}
  .footprint.r2{left:102px; top:22px; animation-delay:1.05s;}
  .footprint.l3{left:136px; top:0; animation-delay:1.4s;}
  .footprint.r3{left:170px; top:22px; animation-delay:1.75s;}
  @keyframes step{
    0%{opacity:0; transform:translateY(4px);}
    15%{opacity:1; transform:translateY(0);}
    70%{opacity:1;}
    100%{opacity:0;}
  }
  .loader-phase{
    font-family:var(--mono);
    font-size:12.5px;
    letter-spacing:0.04em;
    color:var(--primary);
    font-weight:700;
    margin-bottom:6px;
  }
  .loader-sub{font-size:13px; color:var(--ink-faint);}
  .loader-bar{
    width:260px;
    height:4px;
    background:var(--bg-alt);
    border-radius:4px;
    margin:18px auto 0;
    overflow:hidden;
  }
  .loader-bar-fill{
    height:100%;
    width:40%;
    background:var(--primary);
    border-radius:4px;
    animation:slide 1.3s ease-in-out infinite;
  }
  @keyframes slide{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(340%);}
  }

  /* ---------- Error ---------- */
  .error-box{
    background:var(--coral-soft);
    border:1px solid var(--coral);
    color:#7A2E1B;
    border-radius:var(--radius);
    padding:18px 20px;
    font-size:13.5px;
  }
  .error-box strong{display:block; margin-bottom:4px; font-size:14.5px;}

  /* ---------- Results ---------- */
  .results{display:flex; flex-direction:column; gap:22px;}

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  .toolbar .toolbar-title{font-size:13px; color:var(--ink-faint);}
  .toolbar-actions{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .btn-print{
    padding:8px 14px;
    border-radius:9px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink-soft);
    font-family:var(--sans);
    font-weight:700;
    font-size:12.5px;
    cursor:pointer;
  }
  .btn-print:hover{border-color:var(--primary); color:var(--primary);}

  .hero-card{
    background:var(--primary);
    color:#fff;
    border-radius:18px;
    padding:30px 28px;
  }
  .hero-text .name-row{
    display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; margin-bottom:8px;
  }
  .hero-text .p-name{font-size:20px; font-weight:900;}
  .hero-text .p-date{font-family:var(--mono); font-size:12.5px; opacity:.75;}
  .hero-text p{margin:0; font-size:14.5px; line-height:1.7; opacity:.94;}

  .section-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--ink-faint);
    font-weight:700;
    margin:2px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  /* metric step sequence */
  .metric-track{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
  }
  @media (max-width:760px){
    .metric-track{grid-template-columns:repeat(2, 1fr);}
  }
  @media (max-width:480px){
    .metric-track{grid-template-columns:1fr;}
  }
  .metric-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 16px 14px;
    position:relative;
  }
  .metric-card .m-label{font-size:12.5px; color:var(--ink-soft); font-weight:700; margin-bottom:8px; min-height:32px;}
  .m-values{display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .m-value-box{
    background:var(--bg-alt);
    border-radius:8px;
    padding:6px 9px;
    font-family:var(--mono);
    flex:none;
  }
  .m-value-box .m-side{font-size:9.5px; color:var(--ink-faint); display:block; letter-spacing:.05em;}
  .m-value-box .m-num{font-size:13.5px; font-weight:700; color:var(--ink); white-space:nowrap;}
  .m-range{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); margin-bottom:10px;}
  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    font-weight:700;
    padding:3px 9px;
    border-radius:999px;
    margin-bottom:9px;
  }
  .status-pill.good{background:var(--green-soft); color:var(--green);}
  .status-pill.caution{background:var(--amber-soft); color:var(--amber);}
  .status-pill.bad{background:var(--coral-soft); color:var(--coral);}
  .status-pill .dot{width:6px; height:6px; border-radius:50%; background:currentColor;}
  .m-explain{font-size:12.5px; color:var(--ink-soft); line-height:1.55;}

  /* report image gallery */
  .gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
    gap:10px;
  }
  .gallery-thumb{
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    cursor:zoom-in;
    background:var(--panel);
    aspect-ratio:3/4;
  }
  .gallery-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .lightbox{
    position:fixed; inset:0;
    background:rgba(10,18,16,0.86);
    display:flex; align-items:center; justify-content:center;
    z-index:100;
    padding:30px;
    cursor:zoom-out;
  }
  .lightbox img{max-width:100%; max-height:100%; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,0.5);}

  /* concerns + videos */
  .concern-grid{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .concern-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px 22px;
  }
  .concern-card .c-issue{
    font-size:16px; font-weight:800; color:var(--primary);
    margin-bottom:10px;
  }
  .c-clinical{
    font-size:13px;
    color:var(--ink);
    background:var(--primary-soft);
    border-radius:8px;
    padding:9px 12px;
    margin-bottom:8px;
    line-height:1.55;
  }
  .c-clinical-label{
    display:inline-block;
    font-size:10.5px;
    font-weight:800;
    color:var(--primary);
    background:#fff;
    border-radius:5px;
    padding:1px 6px;
    margin-right:8px;
    letter-spacing:.02em;
  }
  .c-related{
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
    margin-bottom:10px;
    line-height:1.55;
  }
  .pain-chips{margin-bottom:12px; display:flex; flex-wrap:wrap; align-items:center; gap:6px;}
  .pain-chips-label{font-size:11px; color:var(--ink-faint); font-weight:700; margin-right:2px;}
  .pain-chip{
    font-size:11.5px;
    font-weight:700;
    color:var(--coral);
    background:var(--coral-soft);
    padding:3px 10px;
    border-radius:999px;
  }
  .concern-card .c-detail{font-size:13px; color:var(--ink-soft); margin-bottom:14px; line-height:1.6; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .c-block{margin-bottom:14px;}
  .c-block-future{
    background:var(--amber-soft);
    border-left:3px solid var(--amber);
    border-radius:8px;
    padding:10px 12px;
  }
  .c-block-future .c-block-title{color:#8a5a10;}
  .c-block-future .c-block-text{color:#6b4a12;}
  .c-block-title{font-size:12px; font-weight:800; color:var(--ink); margin-bottom:5px;}
  .c-block-text{font-size:12.8px; color:var(--ink-soft); line-height:1.65;}

  /* 치료 목표 / 재검사 시기 */
  .goal-card{
    background:var(--primary);
    color:#fff;
    border-radius:14px;
    padding:22px 24px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  @media (max-width:640px){ .goal-card{grid-template-columns:1fr;} }
  .goal-block + .goal-block{
    border-left:1px solid rgba(255,255,255,0.25);
    padding-left:20px;
  }
  @media (max-width:640px){
    .goal-block + .goal-block{border-left:none; padding-left:0; border-top:1px solid rgba(255,255,255,0.25); padding-top:16px;}
  }
  .goal-label{font-size:12.5px; font-weight:800; letter-spacing:.02em; margin-bottom:8px; opacity:.95;}
  .goal-text{font-size:13.5px; line-height:1.7; opacity:.92;}

  .disclaimer{
    font-size:11.5px;
    color:var(--ink-faint);
    text-align:center;
    padding-top:6px;
    line-height:1.6;
  }

  /* patient record search */
  .search-bar{
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }
  .search-bar input{
    flex:1;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 14px;
    font-family:var(--sans);
    font-size:14px;
    color:var(--ink);
    background:var(--panel);
  }
  .search-bar input:focus{outline:none; border-color:var(--primary);}
  .record-table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
  }
  .record-table th{
    text-align:left;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--ink-faint);
    font-weight:700;
    padding:10px 14px;
    background:var(--bg-alt);
    border-bottom:1px solid var(--line);
  }
  .record-table td{
    padding:11px 14px;
    font-size:13.5px;
    color:var(--ink);
    border-bottom:1px solid var(--line);
  }
  .record-table tr:last-child td{border-bottom:none;}
  .record-row{cursor:pointer; transition:background .12s;}
  .record-row:hover{background:var(--primary-soft);}
  .record-table .rt-mono{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft);}
  .record-table .rt-chip{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    color:var(--primary);
    background:var(--primary-soft);
    padding:2px 8px;
    border-radius:999px;
  }
  .rt-delete-cell{width:32px; text-align:center;}
  .rt-delete{
    display:inline-block;
    color:var(--ink-faint);
    padding:4px 7px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
  }
  .rt-delete:hover{color:var(--coral); background:var(--coral-soft);}
  .search-empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-faint);
    font-size:13.5px;
  }
  .search-count{font-size:12.5px; color:var(--ink-faint); margin-bottom:10px;}

  /* ---------- Patient info form ---------- */
  .form-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 22px;
    margin-bottom:16px;
  }
  .form-card .form-title{
    font-size:13px;
    font-weight:800;
    color:var(--primary);
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .form-card .form-title .req{font-size:10.5px; color:var(--ink-faint); font-weight:500;}
  .form-grid{
    display:grid;
    grid-template-columns:1.1fr 0.9fr 1fr 1fr;
    gap:12px;
    margin-bottom:14px;
  }
  @media (max-width:760px){ .form-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:480px){ .form-grid{grid-template-columns:1fr;} }
  .field label{
    display:block;
    font-size:11.5px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  .field input[type=text], .field textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:9px;
    padding:9px 11px;
    font-family:var(--sans);
    font-size:13.5px;
    color:var(--ink);
    background:var(--bg);
    resize:vertical;
  }
  .field input[type=text]:focus, .field textarea:focus, .paste-zone:focus{
    outline:none;
    border-color:var(--primary);
    background:#fff;
  }
  .field textarea{min-height:64px; font-family:var(--sans); line-height:1.5;}
  .form-two{

/* ===================== 업로드 화면 ===================== */
function renderUpload(){
  diagnosisImage = null;
  mainEl.innerHTML = `

      </label>

    <div class="upload-zone" id="dropZone">
      <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
        <rect x="4" y="6" width="38" height="34" rx="4" stroke="#B9C7BF" stroke-width="2"/>

        <circle cx="16" cy="16" r="3" stroke="#E85A3B" stroke-width="2"/>

      <h3>검사 리포트를 올려주세요</h3>

  const dropZone = document.getElementById('dropZone');

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFiles(e.target.files));
  ['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag'); }));
  dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

  const diagZone = document.getElementById('diagPasteZone');
  diagZone.addEventListener('paste', handleDiagnosisPaste);
  diagZone.addEventListener('click', () => diagZone.focus());

  renderFileStrip();

function handleDiagnosisPaste(e){
  const items = (e.clipboardData || window.clipboardData).items;
  for (const item of items){
    if (item.type.indexOf('image') !== -1){
      e.preventDefault();
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = () => {
        diagnosisImage = reader.result;
        renderDiagPreview();
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
}

function renderDiagPreview(){
  const zone = document.getElementById('diagPasteZone');
  if (!zone) return;
  if (diagnosisImage){
    zone.innerHTML = `<img src="${diagnosisImage}" alt="상병 캡처"><span class="pz-remove" id="diagRemove">이미지 제거</span>`;
    document.getElementById('diagRemove').addEventListener('click', (ev) => {
      ev.stopPropagation();
      diagnosisImage = null;
      renderDiagPreview();
    });
  } else {
    zone.innerHTML = `<span>📋 여기 클릭 후 <strong>Ctrl+V</strong>로 상병 캡처 이미지 붙여넣기</span>`;
  }
}

async function handleFiles(fileList){
  for (const file of Array.from(fileList)){
    try{
      const images = await fileToImages(file);
      images.forEach((dataUrl, i) => {
        uploadedFiles.push({ name: file.name + (images.length>1 ? ' · p'+(i+1) : ''), dataUrl });
      });
    }catch(err){
      console.error(err);
      alert(file.name + ' 파일을 읽는 중 문제가 생겼어요.');
    }
  }
  renderFileStrip();
}

function renderFileStrip(){
  const strip = document.getElementById('fileStrip');
  const analyzeRow = document.getElementById('analyzeRow');
  if (!strip) return;
  strip.innerHTML = uploadedFiles.map((f,i) => `
    <div class="file-chip">
      <img src="${f.dataUrl}" alt="">
      <span>${escapeHtml(f.name)}</span>
      <span class="remove" data-i="${i}">✕</span>
    </div>
  `).join('');
  strip.querySelectorAll('.remove').forEach(el => {
    el.addEventListener('click', () => {
      uploadedFiles.splice(parseInt(el.dataset.i,10),1);
      renderFileStrip();
    });
  });
  analyzeRow.style.display = uploadedFiles.length ? 'flex' : 'none';
  const btn = document.getElementById('btnAnalyze');
  if (btn) btn.onclick = runAnalysis;
}

async function fileToImages(file){
  if (file.type === 'application/pdf'){
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const images = [];
    for (let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const viewport = page.getViewport({ scale: 1.6 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff'; // JPEG는 투명 배경을 지원하지 않아 흰 배경을 먼저 채움
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport }).promise;
      // PNG 대신 JPEG로 압축해서 용량을 크게 줄임 (서버 요청 크기 제한 대응)
      images.push(canvas.toDataURL('image/jpeg', 0.85));
    }
    return images;
  } else {
    const dataUrl = await new Promise((resolve,reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
    return [dataUrl];
  }
}

        <svg class="footprint r3" viewBox="0 0 22 34" fill="#E85A3B"><ellipse cx="11" cy="9" rx="7" ry="9"/><circle cx="5" cy="27" r="3"/><circle cx="9.5" cy="30" r="2.6"/><circle cx="14" cy="29" r="2.3"/><circle cx="18" cy="26" r="2"/></svg>

/* ===================== 분석 실행 ===================== */
async function runAnalysis(){
  if (!uploadedFiles.length) return;

  const patientInputs = {
    name: (document.getElementById('pName') || {}).value?.trim() || '',
    dob: (document.getElementById('pDob') || {}).value?.trim() || '',
    chartNo: (document.getElementById('pChart') || {}).value?.trim() || '',
    phone: (document.getElementById('pPhone') || {}).value?.trim() || '',
    history: (document.getElementById('pHistory') || {}).value?.trim() || '',
    diagnosisText: (document.getElementById('pDiagnosisText') || {}).value?.trim() || '',
    romIncluded: (document.getElementById('pRomIncluded') || {}).checked || false
  };
  const diagnosisImg = diagnosisImage;

  renderLoader('STANCE PHASE · 입각기', '리포트를 읽고 있어요…');

  try{
    const extract = await callExtract(uploadedFiles, patientInputs, diagnosisImg);

    // 결과 화면/기록 저장용으로 리포트 원본 이미지를 축소본(저장 용량 절약)으로 준비
    const galleryImages = [];
    for (const f of uploadedFiles){
      try{ galleryImages.push(await downscaleImage(f.dataUrl, 700, 0.72)); }
      catch(e){ galleryImages.push(f.dataUrl); }
    }

    currentResult = { extract, patientInputs, images: galleryImages };
    saveHistory(currentResult);
    renderResults(currentResult);
  }catch(err){
    console.error(err);
    renderError(err.message || '분석 중 문제가 발생했어요.');
  }
}

/**
 * 이미지를 지정한 최대 너비/화질로 축소한 JPEG dataURL로 변환합니다.
 * (원본은 AI 분석용으로 이미 사용했고, 이건 화면 표시·기록 저장용 가벼운 버전입니다)
 */
function downscaleImage(dataUrl, maxWidth, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

function renderError(msg){
  mainEl.innerHTML = `
    <div class="error-box">
      <strong>분석에 실패했어요</strong>
      ${escapeHtml(msg)}
    </div>
    <div class="analyze-row">
      <button class="btn-ghost" id="btnRetry">다시 시도</button>
    </div>
  `;
  document.getElementById('btnRetry').addEventListener('click', runAnalysis);
}

/* ===================== Claude API 호출 ===================== */
async function callExtract(files, patientInputs, diagnosisImg){
  const content = [];

  // 1) 환자 기본정보 + 진료내역 + 상병 텍스트를 컨텍스트로 먼저 제공
  const contextLines = [];
  contextLines.push('아래는 직원이 직접 입력한 환자 기본정보입니다. 리포트 이미지에 이름이 다르게(가명/테스트명 등) 나오더라도, 아래 정보를 patient_name/dob/chart_no에 그대로 사용하세요.');
  contextLines.push('- 이름: ' + (patientInputs.name || '(입력 안 됨)'));
  contextLines.push('- 생년월일(6자리): ' + (patientInputs.dob || '(입력 안 됨)'));
  contextLines.push('- 차트번호: ' + (patientInputs.chartNo || '(입력 안 됨)'));
  if (patientInputs.history){
    contextLines.push('\n[기존 진료 내역]\n' + patientInputs.history);
  }
  if (patientInputs.diagnosisText){
    contextLines.push('\n[상병(진단명) 텍스트]\n' + patientInputs.diagnosisText);
  }
  contextLines.push('\n위 진료 내역·상병 정보가 있다면, 검사 결과를 해석할 때 참고해서 overall_summary나 metrics의 explanation에 자연스럽게 연결해주세요 (예: 이미 알려진 진단과 검사 소견이 어떻게 관련되는지). 단, 새로운 진단을 내리지는 마세요. concerns의 solution_approach는 이 진료 내역에 적힌 "현재 받고 있는 치료"를 그대로 반복하지 말고, 오직 지금 측정된 소견/증상 패턴 자체에 근거해서 독립적으로 판단하세요.');
  if (patientInputs.romIncluded){
    contextLines.push('\n이 환자는 ROM(관절가동범위) 검사도 함께 진행했습니다. 첨부된 이미지 중 "ROM 결과지"(부위별 표준범위 대비 Left/Right 측정각도 표가 있는 리포트)가 있다면: 값이 0이면서 표준범위가 0보다 큰 항목은 "장비상 측정되지 않은 항목"이므로 절대 해석에 사용하지 말고 건너뛰세요 (0을 실제 가동범위 제한으로 오해하면 안 됩니다). 0이 아닌 실제 측정값이 있는 항목 중 표준범위보다 뚜렷이 제한된 부위가 있다면: (a) 반드시 metrics에도 포함하고, (b) 다른 리포트(체형분석/보행/족압)에서 나온 문제들과 별개로 이 ROM 제한만을 다루는 concern을 최소 1개 반드시 만드세요 (체형/자세 문제에 밀려서 ROM 관련 내용이 누락되면 안 됩니다). 그 concern에는 다음을 꼭 반영하세요: (1) 현재 ROM이 표준범위 대비 얼마나 제한되어 있는지, (2) 꾸준한 치료를 지속하면 ROM이 개선될 수 있다는 전망(가능성 어투로), (3) 개선 여부를 확인하기 위해 재검사가 필요하다는 점 — 이 재검사 필요성은 최상위 recheck_timing 필드에도 자연스럽게 반영하세요.');
  }
  content.push({ type: 'text', text: contextLines.join('\n') });

  // 2) 상병 캡처 이미지(있는 경우)
  if (diagnosisImg){
    content.push({ type: 'text', text: '다음은 상병(진단) 목록을 캡처한 이미지입니다. 여기 적힌 상병명들을 참고 정보로 사용하세요:' });
    content.push({ type: 'image', source: { type: 'base64', media_type: getMediaType(diagnosisImg), data: diagnosisImg.split(',')[1] } });
  }

  // 3) 검사 리포트 이미지
  content.push({ type: 'text', text: '다음은 검사 리포트 이미지입니다:' });
  files.forEach(f => {
    content.push({ type: 'image', source: { type: 'base64', media_type: getMediaType(f.dataUrl), data: f.dataUrl.split(',')[1] } });
  });

  content.push({ type: 'text', text: EXTRACT_PROMPT });

  const res = await fetch('/api/anthropic', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 12000,
      messages: [{ role: 'user', content }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(typeof data.error === 'string' ? data.error : (data.error.message || '분석 서버 오류'));
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  const json = extractJSON(text);
  if (!json) {
    if (data.stop_reason === 'max_tokens') {
      throw new Error('응답이 너무 길어서 중간에 잘렸어요. 리포트 이미지 수를 줄이거나 다시 시도해주세요.');
    }
    throw new Error('리포트 해석 결과를 읽을 수 없었어요. 이미지가 선명한지 확인해주세요.');
  }
  return json;
}

const EXTRACT_PROMPT = `당신은 정형외과에서 근무하는 물리치료사입니다. 첨부된 이미지는 환자의 검사 리포트로, 다음 중 하나 이상입니다: (1) 보행분석, (2) 족압/정적균형 검사, (3) 체형분석·3D자세분석(신체 정면·후면·측면 사진에 기울기/틀어짐 수치, 근육도, 자세 평가 레이더차트 등이 포함된 리포트), (4) 3D골격도(측면에서 본 골격 이미지 3장이 나란히 있는 경우: 왼쪽=이상적인(To-be) 자세, 가운데=현재 자세, 오른쪽=현재 습관을 방치했을 때 예상되는 미래 자세), (5) ROM(관절가동범위) 결과지(부위별로 Motion·표준범위·Left/Right 측정각도가 표로 정리된 리포트, 표지에 "ROM 결과지"라고 적혀 있음).

리포트에 이미 인쇄되어 있는 실제 측정값과 표준범위(또는 등급)를 그대로 사용해서, 아래 JSON 형식으로만 응답하세요. 코드블록이나 다른 설명 없이 JSON 객체 하나만 출력하세요.

/**
 * dataURL의 헤더(data:image/jpeg;base64,...)에서 실제 이미지 형식을 읽어옵니다.
 * PDF 페이지는 JPEG로, 클립보드/직접 업로드 이미지는 원래 형식(PNG 등)으로 저장되므로
 * 항상 실제 형식에 맞게 media_type을 지정해야 Claude API가 정상적으로 읽습니다.
 */
function getMediaType(dataUrl){
  const m = dataUrl.match(/^data:([^;]+);/);
  return m ? m[1] : 'image/png';
}

function extractJSON(text){
  if (!text) return null;
  const start = text.indexOf('{');
  if (start === -1) return null;

  // 문자열 안의 중괄호는 무시하면서, 첫 '{'와 짝이 맞는 '}'를 정확히 찾음
  let depth = 0;
  let inString = false;
  let escape = false;
  let end = -1;

  for (let i = start; i < text.length; i++){
    const ch = text[i];
    if (escape){ escape = false; continue; }
    if (ch === '\\'){ escape = true; continue; }
    if (ch === '"'){ inString = !inString; continue; }
    if (inString) continue;
    if (ch === '{') depth++;
    else if (ch === '}'){
      depth--;
      if (depth === 0){ end = i; break; }
    }
  }

  if (end === -1) {
    // 짝이 안 맞음 = 응답이 중간에 잘렸을 가능성이 큼
    console.warn('JSON 파싱 실패: 중괄호 짝이 맞지 않음(응답이 잘렸을 수 있음). 원문:', text);
    return null;
  }

  try{
    return JSON.parse(text.slice(start, end + 1));
  }catch(e){
    console.warn('JSON 파싱 실패:', e.message, '원문:', text);
    return null;
  }
}

function statusClass(s){ return s === 'good' ? 'good' : s === 'bad' ? 'bad' : 'caution'; }

/* ===================== 기록 저장/불러오기 (공유 서버 DB 사용) ===================== */
async function saveHistory(result){
  const id = 'analysis-' + Date.now();
  const entry = {
    id,
    patientName: result.extract.patient_name || '환자',
    testDate: result.extract.test_date || '',
    savedAt: new Date().toISOString(),
    result
  };

  // 화면은 즉시 반영 (서버 응답을 기다리지 않고 먼저 목록 맨 위에 추가)
  historyCache.unshift(entry);
  renderHistory();
  setActiveHistory(id);

  try{
    const res = await fetch('/api/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id,
        patientName: entry.patientName,
        chartNo: result.extract.chart_no || '',
        dob: result.extract.dob || '',
        phone: (result.patientInputs && result.patientInputs.phone) || '',
        testDate: entry.testDate,
        data: result
      })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '저장 실패');
  }catch(e){
    console.warn('서버 저장 실패', e);
    entry.syncFailed = true;
    renderHistory();
    showToast('⚠️ "' + entry.patientName + '" 기록이 서버 저장에 실패했어요. 이 화면을 벗어나면 사라질 수 있어요. (' + (e.message || '') + ')', true);
  }
}

/**
 * 화면 아래에 잠깐 뜨는 알림. isError가 true면 빨간 톤, 오래 표시됨.
 */
function showToast(message, isError){
  const existing = document.getElementById('toastMsg');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'toastMsg';
  toast.className = 'toast' + (isError ? ' toast-error' : '');
  toast.textContent = message;
  document.body.appendChild(toast);

  setTimeout(() => { toast.remove(); }, isError ? 8000 : 3000);
}

async function loadHistory(){
  try{
    const res = await fetch('/api/records');
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '불러오기 실패');

    historyCache = (data.records || []).map(row => ({
      id: row.id,
      patientName: row.patient_name || '환자',
      testDate: row.test_date || '',
      savedAt: row.saved_at,
      result: row.data
    }));
    renderHistory();
  }catch(e){
    console.warn('기록 불러오기 실패', e);
    renderHistory();
  }
}

function renderHistory(){
  if (!historyCache.length){
    historyListEl.innerHTML = `<li class="history-empty">아직 분석 기록이 없어요.</li>`;
    return;
  }
  historyListEl.innerHTML = historyCache.map(entry => `
    <li class="history-item" data-id="${entry.id}">
      <span class="h-main">
        <span class="h-name">${escapeHtml(entry.patientName)}${entry.syncFailed ? '<span class="sync-warn" title="서버 저장 실패">⚠️</span>' : ''}</span>
        <span class="h-date">${escapeHtml(entry.testDate || entry.savedAt.slice(0,10))}</span>
      </span>
      <span class="h-delete" data-id="${entry.id}" title="삭제">✕</span>
    </li>
  `).join('');
  historyListEl.querySelectorAll('.history-item .h-main').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.closest('.history-item').dataset.id;
      const entry = historyCache.find(x => x.id === id);
      if (!entry) return;
      currentResult = entry.result;
      setActiveHistory(entry.id);
      renderResults(currentResult);
    });
  });
  historyListEl.querySelectorAll('.h-delete').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteRecord(el.dataset.id);
    });
  });
}

async function deleteRecord(id){
  const entry = historyCache.find(x => x.id === id);
  if (!entry) return;
  if (!confirm(`"${entry.patientName}" 기록을 삭제할까요? 이 작업은 되돌릴 수 없어요.`)) return;

  try{
    const res = await fetch('/api/records?id=' + encodeURIComponent(id), { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '삭제 실패');
  }catch(e){
    showToast('⚠️ 삭제에 실패했어요: ' + e.message, true);
    return;
  }

  historyCache = historyCache.filter(x => x.id !== id);
  renderHistory();
  if (currentResult === entry.result) {
    uploadedFiles = [];
    currentResult = null;
    renderUpload();
  }
  // 검색 화면이 열려 있으면 표도 갱신
  const tableArea = document.getElementById('recordTableArea');
  if (tableArea) {
    const input = document.getElementById('recordSearchInput');
    updateRecordTable(input ? input.value : '');
  }
  showToast('삭제됐어요.');
}

function setActiveHistory(id){
  historyListEl.querySelectorAll('.history-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

      </div>

function updateRecordTable(query){
  query = (query || '').trim().toLowerCase();

  const rows = historyCache.filter(entry => {
    if (!query) return true;
    const ex = entry.result.extract || {};
    const pi = entry.result.patientInputs || {};
    const haystack = [
      entry.patientName, ex.chart_no, ex.dob, pi.phone, entry.testDate, entry.savedAt
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.indexOf(query) !== -1;
  });

  const rowsHtml = rows.map(entry => {
    const ex = entry.result.extract || {};
    const pi = entry.result.patientInputs || {};
    return `
      <tr class="record-row" data-id="${entry.id}">
        <td><strong>${escapeHtml(entry.patientName)}</strong></td>
        <td class="rt-mono">${escapeHtml(ex.chart_no || '-')}</td>
        <td class="rt-mono">${escapeHtml(ex.dob || '-')}</td>
        <td class="rt-mono">${escapeHtml(pi.phone || '-')}</td>
        <td>${escapeHtml(entry.testDate || '-')}</td>
        <td class="rt-mono">${escapeHtml(entry.savedAt.slice(0,10))}</td>
        <td class="rt-delete-cell"><span class="rt-delete" data-id="${entry.id}" title="삭제">✕</span></td>
      </tr>
    `;
  }).join('');

  document.getElementById('recordSearchCount').textContent = `${historyCache.length}건 중 ${rows.length}건 표시`;

  const tableArea = document.getElementById('recordTableArea');
  tableArea.innerHTML = rows.length ? `
    <table class="record-table">
      <thead>
        <tr>
          <th>이름</th><th>차트번호</th><th>생년월일</th><th>전화번호</th><th>검사일</th><th>저장일</th><th></th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  ` : `<div class="search-empty">${historyCache.length ? '검색 결과가 없어요.' : '아직 분석 기록이 없어요.'}</div>`;

  tableArea.querySelectorAll('.record-row').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.rt-delete')) return; // 삭제 버튼 클릭은 행 열기와 분리
      const entry = historyCache.find(x => x.id === el.dataset.id);
      if (!entry) return;
      currentResult = entry.result;
      document.getElementById('btnSearch').classList.remove('active');
      setActiveHistory(entry.id);
      renderResults(currentResult);
    });
  });
  tableArea.querySelectorAll('.rt-delete').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteRecord(el.dataset.id);
    });
  });
}

/* ===================== 유틸 ===================== */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }
</script>
