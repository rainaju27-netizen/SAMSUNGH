<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광교삼성H정형외과 체형 분석 LAB · 리포트 해설</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg:#F2F6F3;
    --bg-alt:#E7EFE9;
    --panel:#FFFFFF;
    --ink:#152420;
    --ink-soft:#54655D;
    --ink-faint:#8B978F;
    --primary:#0F3D3B;
    --primary-soft:#DCEAE6;
    --coral:#E85A3B;
    --coral-soft:#FBE4DD;
    --amber:#C98A22;
    --amber-soft:#F7EAD2;
    --green:#2F8F62;
    --green-soft:#DCEFE3;
    --line:#D8E2DC;
    --radius:14px;
    --shadow: 0 1px 2px rgba(21,36,32,0.04), 0 8px 24px -12px rgba(21,36,32,0.18);
    --sans:'Noto Sans KR', -apple-system, sans-serif;
    --display:'Space Grotesk', var(--sans);
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--primary); color:#fff;}

  a{color:inherit;}

  .app{
    max-width:1180px;
    margin:0 auto;
    padding:28px 24px 120px;
  }

  /* ---------- Header ---------- */
  .app-header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    padding-bottom:22px;
    border-bottom:1px solid var(--line);
    margin-bottom:28px;
    flex-wrap:wrap;
  }
  .wordmark{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .wordmark .clinic-eyebrow{
    font-family:var(--sans);
    font-size:12px;
    font-weight:700;
    letter-spacing:0.04em;
    color:var(--ink-faint);
  }
  .wordmark .kr{
    font-family:var(--sans);
    font-weight:900;
    font-size:26px;
    letter-spacing:-0.02em;
    color:var(--primary);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .wordmark .kr svg{flex:none;}
  .wordmark .en{
    font-family:var(--display);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-left:38px;
  }
  .header-meta{
    font-size:13px;
    color:var(--ink-soft);
    text-align:right;
  }
  .header-meta strong{color:var(--ink);}

  /* ---------- Layout ---------- */
  .layout{
    display:grid;
    grid-template-columns:240px 1fr;
    gap:24px;
    align-items:start;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    position:sticky;
    top:20px;
  }
  @media (max-width:820px){ .sidebar{position:static;} }
  .sidebar h2{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--ink-faint);
    margin:4px 0 12px;
    font-weight:700;
  }
  .btn-new{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--primary);
    background:var(--primary);
    color:#fff;
    font-family:var(--sans);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    margin-bottom:16px;
    transition:opacity .15s;
  }
  .btn-new:hover{opacity:.88;}
  .btn-search{
    width:100%;
    padding:9px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink-soft);
    font-family:var(--sans);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    margin-bottom:16px;
    transition:border-color .15s, color .15s;
  }
  .btn-search:hover{border-color:var(--primary); color:var(--primary);}
  .btn-search.active{border-color:var(--primary); color:var(--primary); background:var(--primary-soft);}
  .history-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;}
  .history-item{
    padding:9px 10px;
    border-radius:9px;
    cursor:pointer;
    font-size:13px;
    color:var(--ink-soft);
    border:1px solid transparent;
    display:flex;
    flex-direction:column;
    gap:1px;
  }
  .history-item:hover{background:var(--bg-alt);}
  .history-item.active{background:var(--primary-soft); border-color:var(--primary); color:var(--primary);}
  .history-item .h-name{font-weight:700; color:var(--ink);}
  .history-item.active .h-name{color:var(--primary);}
  .history-item .h-date{font-family:var(--mono); font-size:11px; color:var(--ink-faint);}
  .history-empty{font-size:12.5px; color:var(--ink-faint); padding:6px 2px;}

  /* ---------- Main ---------- */
  .main{min-height:420px;}

  /* Upload zone */
  .upload-zone{
    background:var(--panel);
    border:1.5px dashed var(--line);
    border-radius:var(--radius);
    padding:56px 32px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .upload-zone.drag{border-color:var(--primary); background:var(--primary-soft);}
  .upload-zone svg{margin-bottom:14px;}
  .upload-zone h3{
    font-size:18px;
    margin:0 0 6px;
    font-weight:700;
  }
  .upload-zone p{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0;
  }
  .upload-zone input{display:none;}

  .file-strip{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
  }
  .file-chip{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px 8px 8px;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .file-chip img{width:34px; height:34px; object-fit:cover; border-radius:6px; border:1px solid var(--line);}
  .file-chip .remove{cursor:pointer; color:var(--ink-faint); font-weight:700; padding:2px 4px;}
  .file-chip .remove:hover{color:var(--coral);}

  .analyze-row{
    display:flex;
    justify-content:flex-end;
    margin-top:18px;
    gap:10px;
  }
  .btn-primary{
    padding:12px 22px;
    border-radius:10px;
    border:none;
    background:var(--primary);
    color:#fff;
    font-family:var(--sans);
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .btn-primary:disabled{opacity:.45; cursor:not-allowed;}
  .btn-primary:not(:disabled):hover{opacity:.9;}
  .btn-ghost{
    padding:12px 18px;
    border-radius:10px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    font-family:var(--sans);
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--ink-faint); color:var(--ink);}

  /* ---------- Gait loader ---------- */
  .loader-wrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:52px 24px;
    text-align:center;
  }
  .gait-track{
    position:relative;
    width:220px;
    height:64px;
    margin:0 auto 22px;
  }
  .footprint{
    position:absolute;
    width:22px;
    height:34px;
    opacity:0;
    animation:step 1.4s infinite;
  }
  .footprint.l{left:0; top:0; animation-delay:0s;}
  .footprint.r{left:34px; top:22px; animation-delay:.35s;}
  .footprint.l2{left:68px; top:0; animation-delay:.7s;}
  .footprint.r2{left:102px; top:22px; animation-delay:1.05s;}
  .footprint.l3{left:136px; top:0; animation-delay:1.4s;}
  .footprint.r3{left:170px; top:22px; animation-delay:1.75s;}
  @keyframes step{
    0%{opacity:0; transform:translateY(4px);}
    15%{opacity:1; transform:translateY(0);}
    70%{opacity:1;}
    100%{opacity:0;}
  }
  .loader-phase{
    font-family:var(--mono);
    font-size:12.5px;
    letter-spacing:0.04em;
    color:var(--primary);
    font-weight:700;
    margin-bottom:6px;
  }
  .loader-sub{font-size:13px; color:var(--ink-faint);}
  .loader-bar{
    width:260px;
    height:4px;
    background:var(--bg-alt);
    border-radius:4px;
    margin:18px auto 0;
    overflow:hidden;
  }
  .loader-bar-fill{
    height:100%;
    width:40%;
    background:var(--primary);
    border-radius:4px;
    animation:slide 1.3s ease-in-out infinite;
  }
  @keyframes slide{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(340%);}
  }

  /* ---------- Error ---------- */
  .error-box{
    background:var(--coral-soft);
    border:1px solid var(--coral);
    color:#7A2E1B;
    border-radius:var(--radius);
    padding:18px 20px;
    font-size:13.5px;
  }
  .error-box strong{display:block; margin-bottom:4px; font-size:14.5px;}

  /* ---------- Results ---------- */
  .results{display:flex; flex-direction:column; gap:22px;}

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  .toolbar .toolbar-title{font-size:13px; color:var(--ink-faint);}

  .hero-card{
    background:var(--primary);
    color:#fff;
    border-radius:18px;
    padding:30px 28px;
    display:grid;
    grid-template-columns:auto 1fr;
    gap:26px;
    align-items:center;
  }
  @media (max-width:640px){ .hero-card{grid-template-columns:1fr;} }
  .score-ring{
    width:104px; height:104px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.35);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    flex:none;
    padding:8px;
    box-sizing:border-box;
    overflow:hidden;
  }
  .score-ring .num{
    font-family:var(--mono); font-weight:700;
    font-size:30px;
    line-height:1.1;
    text-align:center;
    word-break:keep-all;
    overflow-wrap:break-word;
    max-width:100%;
  }
  .score-ring .num.long{font-size:15px;}
  .score-ring .num.medium{font-size:20px;}
  .score-ring .lbl{font-size:9px; letter-spacing:.08em; opacity:.75; margin-top:2px;}
  .hero-text .name-row{
    display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; margin-bottom:8px;
  }
  .hero-text .p-name{font-size:20px; font-weight:900;}
  .hero-text .p-date{font-family:var(--mono); font-size:12.5px; opacity:.75;}
  .hero-text p{margin:0; font-size:14.5px; line-height:1.7; opacity:.94;}

  .section-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--ink-faint);
    font-weight:700;
    margin:2px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  /* metric step sequence */
  .metric-track{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
  }
  @media (max-width:760px){
    .metric-track{grid-template-columns:repeat(2, 1fr);}
  }
  @media (max-width:480px){
    .metric-track{grid-template-columns:1fr;}
  }
  .metric-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 16px 14px;
    position:relative;
  }
  .metric-card .m-label{font-size:12.5px; color:var(--ink-soft); font-weight:700; margin-bottom:8px; min-height:32px;}
  .m-values{display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .m-value-box{
    background:var(--bg-alt);
    border-radius:8px;
    padding:6px 9px;
    font-family:var(--mono);
  }
  .m-value-box .m-side{font-size:9.5px; color:var(--ink-faint); display:block; letter-spacing:.05em;}
  .m-value-box .m-num{font-size:15px; font-weight:700; color:var(--ink);}
  .m-range{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); margin-bottom:10px;}
  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    font-weight:700;
    padding:3px 9px;
    border-radius:999px;
    margin-bottom:9px;
  }
  .status-pill.good{background:var(--green-soft); color:var(--green);}
  .status-pill.caution{background:var(--amber-soft); color:var(--amber);}
  .status-pill.bad{background:var(--coral-soft); color:var(--coral);}
  .status-pill .dot{width:6px; height:6px; border-radius:50%; background:currentColor;}
  .m-explain{font-size:12.5px; color:var(--ink-soft); line-height:1.55;}

  /* report image gallery */
  .gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
    gap:10px;
  }
  .gallery-thumb{
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    cursor:zoom-in;
    background:var(--panel);
    aspect-ratio:3/4;
  }
  .gallery-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .lightbox{
    position:fixed; inset:0;
    background:rgba(10,18,16,0.86);
    display:flex; align-items:center; justify-content:center;
    z-index:100;
    padding:30px;
    cursor:zoom-out;
  }
  .lightbox img{max-width:100%; max-height:100%; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,0.5);}

  /* concerns + videos */
  .concern-grid{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .concern-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px 22px;
  }
  .concern-card .c-issue{
    font-size:16px; font-weight:800; color:var(--primary);
    margin-bottom:10px;
  }
  .c-clinical{
    font-size:13px;
    color:var(--ink);
    background:var(--primary-soft);
    border-radius:8px;
    padding:9px 12px;
    margin-bottom:8px;
    line-height:1.55;
  }
  .c-clinical-label{
    display:inline-block;
    font-size:10.5px;
    font-weight:800;
    color:var(--primary);
    background:#fff;
    border-radius:5px;
    padding:1px 6px;
    margin-right:8px;
    letter-spacing:.02em;
  }
  .c-related{
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
    margin-bottom:10px;
    line-height:1.55;
  }
  .pain-chips{margin-bottom:12px; display:flex; flex-wrap:wrap; align-items:center; gap:6px;}
  .pain-chips-label{font-size:11px; color:var(--ink-faint); font-weight:700; margin-right:2px;}
  .pain-chip{
    font-size:11.5px;
    font-weight:700;
    color:var(--coral);
    background:var(--coral-soft);
    padding:3px 10px;
    border-radius:999px;
  }
  .concern-card .c-detail{font-size:13px; color:var(--ink-soft); margin-bottom:14px; line-height:1.6; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .c-block{margin-bottom:14px;}
  .c-block-title{font-size:12px; font-weight:800; color:var(--ink); margin-bottom:5px;}
  .c-block-text{font-size:12.8px; color:var(--ink-soft); line-height:1.65;}
  .video-list{display:flex; flex-direction:column; gap:8px;}
  .video-link{
    display:flex;
    gap:10px;
    align-items:flex-start;
    padding:9px 10px;
    border-radius:9px;
    background:var(--bg-alt);
    text-decoration:none;
    transition:background .15s;
  }
  .video-link:hover{background:var(--primary-soft);}
  .video-link .play{
    flex:none;
    width:26px; height:26px;
    border-radius:50%;
    background:var(--coral);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    margin-top:1px;
  }
  .video-link .v-title{font-size:12.8px; font-weight:700; color:var(--ink); line-height:1.4;}
  .video-link .v-channel{font-size:11px; color:var(--ink-faint); margin-top:2px;}
  .video-link .v-url{font-size:10.5px; font-family:var(--mono); color:var(--primary); margin-top:3px; word-break:break-all;}
  .video-empty{font-size:12px; color:var(--ink-faint);}

  .disclaimer{
    font-size:11.5px;
    color:var(--ink-faint);
    text-align:center;
    padding-top:6px;
    line-height:1.6;
  }

  /* patient record search */
  .search-bar{
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }
  .search-bar input{
    flex:1;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 14px;
    font-family:var(--sans);
    font-size:14px;
    color:var(--ink);
    background:var(--panel);
  }
  .search-bar input:focus{outline:none; border-color:var(--primary);}
  .record-table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
  }
  .record-table th{
    text-align:left;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--ink-faint);
    font-weight:700;
    padding:10px 14px;
    background:var(--bg-alt);
    border-bottom:1px solid var(--line);
  }
  .record-table td{
    padding:11px 14px;
    font-size:13.5px;
    color:var(--ink);
    border-bottom:1px solid var(--line);
  }
  .record-table tr:last-child td{border-bottom:none;}
  .record-row{cursor:pointer; transition:background .12s;}
  .record-row:hover{background:var(--primary-soft);}
  .record-table .rt-mono{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft);}
  .record-table .rt-chip{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    color:var(--primary);
    background:var(--primary-soft);
    padding:2px 8px;
    border-radius:999px;
  }
  .search-empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-faint);
    font-size:13.5px;
  }
  .search-count{font-size:12.5px; color:var(--ink-faint); margin-bottom:10px;}

  /* copy box */
  .copy-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    margin-top:14px;
    overflow:hidden;
  }
  .copy-box-primary{
    border:1.5px solid var(--primary);
    margin-top:0;
    margin-bottom:18px;
    box-shadow:0 2px 12px -4px rgba(15,61,59,0.25);
  }
  .copy-box-primary .copy-box-header{
    background:var(--primary-soft);
    color:var(--primary);
    font-size:13.5px;
  }
  .copy-box-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 16px;
    background:var(--bg-alt);
    border-bottom:1px solid var(--line);
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
  }
  .btn-copy{
    padding:7px 14px;
    border-radius:8px;
    border:1px solid var(--primary);
    background:var(--primary);
    color:#fff;
    font-family:var(--sans);
    font-weight:700;
    font-size:12.5px;
    cursor:pointer;
    white-space:nowrap;
  }
  .btn-copy:hover{opacity:.9;}
  .btn-copy.copied{background:var(--green); border-color:var(--green);}
  .copy-box-text{
    margin:0;
    padding:16px;
    font-family:var(--sans);
    font-size:13px;
    line-height:1.7;
    color:var(--ink);
    white-space:pre-wrap;
    word-break:break-word;
    max-height:320px;
    overflow-y:auto;
  }

  /* ---------- Patient info form ---------- */
  .form-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 22px;
    margin-bottom:16px;
  }
  .form-card .form-title{
    font-size:13px;
    font-weight:800;
    color:var(--primary);
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:7px;
  }

async function handleFiles(fileList){

async function fileToImages(file){
  if (file.type === 'application/pdf'){
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const images = [];
    for (let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const viewport = page.getViewport({ scale: 1.6 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      images.push(canvas.toDataURL('image/png'));
    }
    return images;
  } else {
    const dataUrl = await new Promise((resolve,reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
    return [dataUrl];
  }
}

/**
 * 이미지를 지정한 최대 너비/화질로 축소한 JPEG dataURL로 변환합니다.
 * (원본은 AI 분석용으로 이미 사용했고, 이건 화면 표시·기록 저장용 가벼운 버전입니다)
 */
function downscaleImage(dataUrl, maxWidth, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

function renderError(msg){

async function callExtract(files, patientInputs, diagnosisImg){
  const content = [];

  // 1) 환자 기본정보 + 진료내역 + 상병 텍스트를 컨텍스트로 먼저 제공

  contextLines.push('아래는 직원이 직접 입력한 환자 기본정보입니다. 리포트 이미지에 이름이 다르게(가명/테스트명 등) 나오더라도, 아래 정보를 patient_name/dob/chart_no에 그대로 사용하세요.');
  contextLines.push('- 이름: ' + (patientInputs.name || '(입력 안 됨)'));
  contextLines.push('- 생년월일(6자리): ' + (patientInputs.dob || '(입력 안 됨)'));
  contextLines.push('- 차트번호: ' + (patientInputs.chartNo || '(입력 안 됨)'));
  if (patientInputs.history){
    contextLines.push('\n[기존 진료 내역]\n' + patientInputs.history);
  }
  if (patientInputs.diagnosisText){
    contextLines.push('\n[상병(진단명) 텍스트]\n' + patientInputs.diagnosisText);
  }
  contextLines.push('\n위 진료 내역·상병 정보가 있다면, 검사 결과를 해석할 때 참고해서 overall_summary나 metrics의 explanation에 자연스럽게 연결해주세요 (예: 이미 알려진 진단과 검사 소견이 어떻게 관련되는지). 단, 새로운 진단을 내리지는 마세요.');
  content.push({ type: 'text', text: contextLines.join('\n') });

  // 2) 상병 캡처 이미지(있는 경우)
  if (diagnosisImg){
    content.push({ type: 'text', text: '다음은 상병(진단) 목록을 캡처한 이미지입니다. 여기 적힌 상병명들을 참고 정보로 사용하세요:' });
    content.push({ type: 'image', source: { type: 'base64', media_type: 'image/png', data: diagnosisImg.split(',')[1] } });
  }

  // 3) 검사 리포트 이미지
  content.push({ type: 'text', text: '다음은 검사 리포트 이미지입니다:' });
  files.forEach(f => {
    content.push({ type: 'image', source: { type: 'base64', media_type: 'image/png', data: f.dataUrl.split(',')[1] } });
  });

  content.push({ type: 'text', text: EXTRACT_PROMPT });

  const res = await fetch('/api/anthropic', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 5000,
      messages: [{ role: 'user', content }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(typeof data.error === 'string' ? data.error : (data.error.message || '분석 서버 오류'));
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  const json = extractJSON(text);
  if (!json) {
    if (data.stop_reason === 'max_tokens') {
      throw new Error('응답이 너무 길어서 중간에 잘렸어요. 리포트 이미지 수를 줄이거나 다시 시도해주세요.');
    }
    throw new Error('리포트 해석 결과를 읽을 수 없었어요. 이미지가 선명한지 확인해주세요.');
  }
  return json;
}

async function callVideoSearch(concerns){
  const prompt = VIDEO_PROMPT_PREFIX + JSON.stringify(concerns.map(c => ({ issue: c.issue, search_query: c.search_query }))) + VIDEO_PROMPT_SUFFIX;

  const res = await fetch('/api/anthropic', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }],
      tools: [{ type: 'web_search_20250305', name: 'web_search' }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(typeof data.error === 'string' ? data.error : (data.error.message || '영상 검색 서버 오류'));
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  const json = extractJSON(text);
  return json || { videos: [] };
}

const VIDEO_PROMPT_PREFIX = `아래는 환자의 보행/균형 분석에서 발견된 문제 목록입니다. 각 문제마다 실제로 존재하는 유튜브 운동 영상을 웹 검색으로 찾아 최대 2개씩 추천해주세요. 검색으로 URL이 실제 확인된 영상만 포함하고, 확신할 수 없으면 제외하세요.

문제 목록: `;
const VIDEO_PROMPT_SUFFIX = `

다음 JSON 형식으로만 응답하세요. 다른 텍스트나 코드블록 없이 JSON 객체 하나만 출력하세요.
{
  "videos": [
    { "issue": "문제 목록의 issue와 동일한 값", "title": "영상 제목", "channel": "채널명(없으면 null)", "url": "실제 유튜브 URL" }
  ]
}`;

function extractJSON(text){
  if (!text) return null;
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start === -1 || end === -1) return null;
  try{
    return JSON.parse(text.slice(start, end+1));
  }catch(e){
    return null;
  }
}

          <div class="c-block">
            <div class="c-block-title">왜 이런 결과가 나왔을까요?</div>

          </div>
        ` : ''}

      <div class="disclaimer">본 해설은 참고자료이며, 정확한 진단과 처방을 위해서는 반드시 의료진과 상담하세요.</div>

    patientMode = !patientMode;
    document.body.classList.toggle('patient-mode', patientMode);
    renderResults(currentResult);
  });

  const galleryGrid = document.getElementById('galleryGrid');
  if (galleryGrid){
    galleryGrid.querySelectorAll('.gallery-thumb').forEach(el => {
      el.addEventListener('click', () => openLightbox(result.images[parseInt(el.dataset.i,10)]));
    });
  }

  const copyBtn = document.getElementById('btnCopyExercise');
  if (copyBtn){
    copyBtn.addEventListener('click', async () => {
      const text = buildExerciseMessage(result);
      try{
        await navigator.clipboard.writeText(text);
      }catch(e){
        // 클립보드 API가 막힌 환경 대비: 텍스트 선택으로 대체
        const range = document.createRange();
        range.selectNodeContents(document.getElementById('exerciseCopyText'));
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('copy');
        sel.removeAllRanges();
      }
      copyBtn.textContent = '✅ 복사됨!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '📋 복사하기';
        copyBtn.classList.remove('copied');
      }, 1800);
    });
  }
}

function openLightbox(src){
  const box = document.createElement('div');
  box.className = 'lightbox';
  box.innerHTML = `<img src="${src}" alt="">`;
  box.addEventListener('click', () => box.remove());
  document.body.appendChild(box);
}

function statusClass(s){ return s === 'good' ? 'good' : s === 'bad' ? 'bad' : 'caution'; }
function statusLabel(s){ return s === 'good' ? '좋음' : s === 'bad' ? '주의 필요' : '보통'; }

function buildExerciseMessage(result){
  const lines = [];
  lines.push((result.extract.patient_name || '환자') + '님, 검사 결과를 바탕으로 도움이 될 만한 운동을 보내드려요.');
  (result.extract.concerns || []).forEach(c => {
    lines.push('');
    lines.push('[' + c.issue + ']');
    const vids = (result.videos.videos || []).filter(v => v.issue === c.issue);
    vids.forEach(v => lines.push('- ' + v.title + ' : ' + v.url));
  });
  return lines.join('\n');
}

/* ===================== 기록 저장/불러오기 (공유 서버 DB 사용) ===================== */
async function saveHistory(result){
  const id = 'analysis-' + Date.now();
  const entry = {
    id,
    patientName: result.extract.patient_name || '환자',
    testDate: result.extract.test_date || '',
    savedAt: new Date().toISOString(),
    result
  };

  // 화면은 즉시 반영 (서버 응답을 기다리지 않고 먼저 목록 맨 위에 추가)
  historyCache.unshift(entry);
  renderHistory();
  setActiveHistory(id);

  try{
    const res = await fetch('/api/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id,
        patientName: entry.patientName,
        chartNo: result.extract.chart_no || '',
        dob: result.extract.dob || '',
        phone: (result.patientInputs && result.patientInputs.phone) || '',
        testDate: entry.testDate,
        data: result
      })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '저장 실패');
  }catch(e){
    console.warn('서버 저장 실패 (이 기기에서만 임시로 보여요)', e);
  }
}

async function loadHistory(){
  try{
    const res = await fetch('/api/records');
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '불러오기 실패');

    historyCache = (data.records || []).map(row => ({
      id: row.id,
      patientName: row.patient_name || '환자',
      testDate: row.test_date || '',
      savedAt: row.saved_at,
      result: row.data
    }));
    renderHistory();
  }catch(e){
    console.warn('기록 불러오기 실패', e);
    renderHistory();
  }
}

function renderHistory(){
  if (!historyCache.length){
    historyListEl.innerHTML = `<li class="history-empty">아직 분석 기록이 없어요.</li>`;
    return;
  }
  historyListEl.innerHTML = historyCache.map(entry => `
    <li class="history-item" data-id="${entry.id}">
      <span class="h-name">${escapeHtml(entry.patientName)}</span>
      <span class="h-date">${escapeHtml(entry.testDate || entry.savedAt.slice(0,10))}</span>
    </li>
  `).join('');
  historyListEl.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      const entry = historyCache.find(x => x.id === el.dataset.id);
      if (!entry) return;
      currentResult = entry.result;
      setActiveHistory(entry.id);
      renderResults(currentResult);
    });
  });
}

function setActiveHistory(id){
  historyListEl.querySelectorAll('.history-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

/* ===================== 환자 기록 검색 탭 ===================== */
function renderHistorySearch(){
  mainEl.innerHTML = `
    <div class="results">
      <div class="toolbar">
        <div class="toolbar-title">환자 기록 검색</div>
      </div>
      <div class="search-bar">
        <input type="text" id="recordSearchInput" placeholder="이름, 차트번호, 생년월일, 전화번호, 검사일로 검색...">
      </div>
      <div class="search-count" id="recordSearchCount"></div>
      <div id="recordTableArea"></div>
    </div>
  `;

  const input = document.getElementById('recordSearchInput');
  // input 이벤트는 표 영역만 갱신 (검색창 자체는 다시 만들지 않아야 한글 조합이 안 깨짐)
  input.addEventListener('input', () => updateRecordTable(input.value));
  input.focus();

  updateRecordTable('');
}

function updateRecordTable(query){
  query = (query || '').trim().toLowerCase();

  const rows = historyCache.filter(entry => {
    if (!query) return true;
    const ex = entry.result.extract || {};
    const pi = entry.result.patientInputs || {};
    const haystack = [
      entry.patientName, ex.chart_no, ex.dob, pi.phone, entry.testDate, entry.savedAt
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.indexOf(query) !== -1;
  });

  const rowsHtml = rows.map(entry => {
    const ex = entry.result.extract || {};
    const pi = entry.result.patientInputs || {};
    return `
      <tr class="record-row" data-id="${entry.id}">
        <td><strong>${escapeHtml(entry.patientName)}</strong></td>
        <td class="rt-mono">${escapeHtml(ex.chart_no || '-')}</td>
        <td class="rt-mono">${escapeHtml(ex.dob || '-')}</td>
        <td class="rt-mono">${escapeHtml(pi.phone || '-')}</td>
        <td>${escapeHtml(entry.testDate || '-')}</td>
        <td><span class="rt-chip">${ex.overall_score != null ? escapeHtml(String(ex.overall_score)) : '-'}</span></td>
        <td class="rt-mono">${escapeHtml(entry.savedAt.slice(0,10))}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('recordSearchCount').textContent = `${historyCache.length}건 중 ${rows.length}건 표시`;

  const tableArea = document.getElementById('recordTableArea');
  tableArea.innerHTML = rows.length ? `
    <table class="record-table">
      <thead>
        <tr>
          <th>이름</th><th>차트번호</th><th>생년월일</th><th>전화번호</th><th>검사일</th><th>점수</th><th>저장일</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  ` : `<div class="search-empty">${historyCache.length ? '검색 결과가 없어요.' : '아직 분석 기록이 없어요.'}</div>`;

  tableArea.querySelectorAll('.record-row').forEach(el => {
    el.addEventListener('click', () => {
      const entry = historyCache.find(x => x.id === el.dataset.id);
      if (!entry) return;
      currentResult = entry.result;
      document.getElementById('btnSearch').classList.remove('active');
      setActiveHistory(entry.id);
      renderResults(currentResult);
    });
  });
}

/* ===================== 유틸 ===================== */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }
